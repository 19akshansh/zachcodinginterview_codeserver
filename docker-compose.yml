version: "3"

services:
  api:
    image: ghcr.io/engineer-man/piston
    container_name: piston_api
    restart: unless-stopped
    privileged: true
    ports:
      - "2000:2000"
    volumes:
      - ./piston-data:/piston
    tmpfs:
      - /piston/jobs:exec
    environment:
      # --- Concurrency: keep low on a 512MB box ---
      PISTON_MAX_CONCURRENT_JOBS: "2"

      # --- Per-job resource limits (applied to every run unless overridden per-language) ---
      PISTON_RUN_MEMORY_LIMIT: "128000000"      # 128MB per run
      PISTON_COMPILE_MEMORY_LIMIT: "128000000"   # 128MB per compile (n/a for py/js but harmless)
      PISTON_RUN_TIMEOUT: "3000"                 # 3s wall time per run
      PISTON_COMPILE_TIMEOUT: "5000"              # 5s for any compile step
      PISTON_OUTPUT_MAX_SIZE: "1024000"           # cap stdout/stderr to 1MB
      PISTON_MAX_PROCESS_COUNT: "16"              # no fork bombs
      PISTON_MAX_OPEN_FILES: "128"
      PISTON_MAX_FILE_SIZE: "5000000"             # 5MB max submitted/generated file size
      PISTON_DISABLE_NETWORKING: "true"           # sandboxed code cannot make network calls

    # Cap the container itself so it can't exceed what the free host gives you
    deploy:
      resources:
        limits:
          memory: 480M

  # Runs once on startup: waits for the api container to be reachable, then
  # installs Python + JS. Idempotent — if the packages already exist on the
  # ./piston-data volume from a previous run, the install calls are cheap
  # no-ops. This removes the need for any manual step or shell access.
  installer:
    image: curlimages/curl:latest
    container_name: piston_installer
    depends_on:
      - api
    restart: "no"
    entrypoint: >
      sh -c "
      echo 'Waiting for Piston API...';
      until curl -sf http://api:2000/api/v2/runtimes > /dev/null; do sleep 2; done;
      echo 'API is up. Installing Python...';
      curl -s -X POST http://api:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\": \"python\", \"version\": \"3.12.0\"}';
      echo '';
      echo 'Installing Node.js...';
      curl -s -X POST http://api:2000/api/v2/packages -H 'Content-Type: application/json' -d '{\"language\": \"node\", \"version\": \"20.11.1\"}';
      echo '';
      echo 'Runtime install complete.';
      "
